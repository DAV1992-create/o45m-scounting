<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>England Hockey — O45M Scouting 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap');
:root{
  --red:#C8102E;--red-dark:#9a0c22;--red-bg:rgba(200,16,46,0.08);
  --white:#fff;--off:#f5f5f5;--light:#eeeeee;--border:#e0e0e0;
  --muted:#888;--dark:#1a1a1a;--sidebar:#1c1c1c;
  --green:#1a7a3c;--green-bg:rgba(26,122,60,0.1);
  --amber:#b85c00;--amber-bg:rgba(184,92,0,0.1);
  --reject:#9a0c22;--reject-bg:rgba(154,12,34,0.08);
  --shadow:0 2px 8px rgba(0,0,0,0.09);--shadow-lg:0 6px 20px rgba(0,0,0,0.14);
  --sidebar-w:210px;
  --touch:48px; /* minimum touch target */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--light);color:var(--dark);}

/* ── SYNC STATUS BAR ── */
#syncBar{
  position:fixed;top:0;left:0;right:0;
  height:3px;background:transparent;z-index:1000;
  transition:background 0.3s;
}
#syncBar.syncing{background:var(--amber);}
#syncBar.synced{background:var(--green);}
#syncBar.error{background:var(--red);}

/* ── HEADER ── */
header{
  background:var(--red);height:56px;
  display:flex;align-items:center;padding:0 16px;gap:12px;
  position:fixed;top:0;left:0;right:0;z-index:300;
  box-shadow:0 2px 10px rgba(200,16,46,0.4);
}
.logo-img{height:38px;width:auto;filter:brightness(0) invert(1);flex-shrink:0;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:0.05em;text-transform:uppercase;color:white;line-height:1.15;}
.hdr-title small{font-size:10px;font-weight:400;letter-spacing:0.08em;display:block;opacity:0.8;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.stat-chip{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:3px 10px;font-size:11px;font-weight:700;color:white;white-space:nowrap;}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.8);font-weight:600;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);transition:background 0.3s;}
.sync-dot.live{background:#4cff91;box-shadow:0 0 6px #4cff91;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.error{background:#ff6b6b;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* Sidebar toggle button (mobile/iPad) */
.menu-btn{
  background:rgba(255,255,255,0.15);border:none;
  border-radius:8px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.menu-btn svg{width:18px;height:18px;fill:white;}

/* ── LAYOUT ── */
.app{
  display:flex;
  height:100dvh;
  padding-top:56px;
}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--sidebar);
  overflow-y:auto;overflow-x:hidden;
  padding:10px 0 30px;
  position:fixed;left:0;top:56px;bottom:0;
  z-index:200;
  transform:translateX(-100%);
  transition:transform 0.25s ease;
  -webkit-overflow-scrolling:touch;
}
.sidebar.open{transform:translateX(0);}
/* iPad landscape — always show sidebar */
@media (min-width:900px){
  .sidebar{transform:translateX(0);position:relative;top:auto;bottom:auto;flex-shrink:0;}
  .menu-btn{display:none;}
  .sidebar-overlay{display:none!important;}
}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199;
}
.sidebar-overlay.show{display:block;}

.sb-search{padding:8px 10px 8px;}
.sb-input{
  width:100%;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  padding:9px 12px;color:white;font-size:14px;
  font-family:'Barlow',sans-serif;outline:none;
  -webkit-appearance:none;
}
.sb-input::placeholder{color:rgba(255,255,255,0.3);}
.sb-input:focus{border-color:var(--red);}
.sb-label{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:10px 10px 4px;display:block;}
.sb-btn{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;min-height:var(--touch);padding:0 10px;
  background:transparent;border:none;
  color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;
  font-family:'Barlow',sans-serif;text-align:left;cursor:pointer;
  border-left:3px solid transparent;transition:all 0.12s;
}
.sb-btn:hover,.sb-btn:active{color:white;background:rgba(255,255,255,0.06);}
.sb-btn.active{color:white;background:rgba(200,16,46,0.2);border-left-color:var(--red);}
.sb-count{font-size:10px;font-weight:700;background:rgba(255,255,255,0.1);border-radius:10px;padding:1px 7px;min-width:22px;text-align:center;}
.sb-btn.active .sb-count{background:rgba(200,16,46,0.4);}
.area-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;flex-shrink:0;}
.sb-div{height:1px;background:rgba(255,255,255,0.07);margin:6px 10px;}
.sq-legend{padding:4px 10px 8px;display:flex;flex-direction:column;gap:5px;}
.sq-leg-row{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,0.4);}
.sq-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── MAIN ── */
.main{
  flex:1;display:flex;flex-direction:column;
  min-width:0;overflow:hidden;
  margin-left:0;
}
@media(min-width:900px){.main{margin-left:0;}}

.view-nav{
  background:white;border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:0 12px;position:sticky;top:0;z-index:100;
  scrollbar-width:none;
}
.view-nav::-webkit-scrollbar{display:none;}
.view-tab{
  background:transparent;border:none;
  border-bottom:3px solid transparent;
  padding:0 14px;height:46px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:0.07em;
  text-transform:uppercase;color:var(--muted);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  margin-bottom:-1px;transition:color 0.15s;
}
.view-tab.active{color:var(--red);border-bottom-color:var(--red);}

.view-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;-webkit-overflow-scrolling:touch;}

/* ── GRID ── */
#gridView{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
@media(max-width:600px){#gridView{grid-template-columns:1fr;}}
#listView{display:none;flex-direction:column;gap:4px;}
#scheduleView{display:none;}
#summaryView{display:none;}

/* ── PLAYER CARD ── */
.player-card{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
.card-strip{height:6px;}
.card-body{padding:14px 14px 12px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:0.02em;color:var(--dark);line-height:1.15;}
.card-club{font-size:11px;color:var(--muted);margin-top:2px;}
.card-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#ddd;line-height:1;flex-shrink:0;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;align-items:center;}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
.tag-area{color:white;}
.tag-area.light{color:#1a1a1a;}
.tag-gk{background:#fff3e0;color:#b85c00;}
.tag-out{background:#e8f4fd;color:#1565c0;}
.tag-cap{background:#fff8e1;color:#b8860b;}
.sq-badge{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
.sq-badge.main{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
.sq-badge.main-ntr{background:#f3f8ff;color:#5c8bcc;border:1px solid #c5d9f5;}
.sq-badge.som{background:#f3e5f5;color:#7b1fa2;border:1px solid #ce93d8;}
.sq-badge.som-ntr{background:#faf0fc;color:#9c5ab8;border:1px solid #e2c0ef;}

/* Ratings — larger touch targets on iPad */
.ratings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.rating-item label{display:block;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.stars{display:flex;gap:3px;}
.star{width:22px;height:22px;cursor:pointer;flex-shrink:0;padding:2px;}
.star svg{width:100%;height:100%;display:block;}

.notes-field{
  width:100%;background:#f8f8f8;border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;
  font-family:'Barlow',sans-serif;font-size:13px;line-height:1.5;
  color:var(--dark);resize:none;outline:none;min-height:56px;
  -webkit-appearance:none;transition:border-color 0.15s;
}
.notes-field:focus{border-color:var(--red);background:white;}
.notes-field::placeholder{color:#ccc;}

.dec-row{display:flex;gap:6px;margin-top:10px;}
.dec-btn{
  flex:1;min-height:40px;padding:0 4px;
  border-radius:8px;border:1.5px solid;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:800;letter-spacing:0.07em;
  text-transform:uppercase;cursor:pointer;
  background:transparent;transition:all 0.15s;
}
.dec-btn.recommend{border-color:#b2dfdb;color:var(--green);}
.dec-btn.recommend.active,.dec-btn.recommend:active{background:var(--green);border-color:var(--green);color:white;}
.dec-btn.monitor{border-color:#ffe0b2;color:var(--amber);}
.dec-btn.monitor.active,.dec-btn.monitor:active{background:var(--amber);border-color:var(--amber);color:white;}
.dec-btn.reject{border-color:#ffcdd2;color:var(--reject);}
.dec-btn.reject.active,.dec-btn.reject:active{background:var(--reject);border-color:var(--reject);color:white;}

/* Syncing spinner on card */
.card-sync{height:2px;background:transparent;transition:background 0.3s;border-radius:0 0 2px 2px;}
.card-sync.saving{background:var(--amber);}
.card-sync.saved{background:var(--green);}

/* ── LIST VIEW ── */
.list-hdr,.list-row{
  display:grid;
  grid-template-columns:36px 1fr 90px 50px 100px 130px;
  gap:8px;align-items:center;padding:10px 12px;border-radius:8px;
}
@media(max-width:700px){
  .list-hdr,.list-row{grid-template-columns:30px 1fr 70px 100px;}
  .list-hide{display:none;}
}
.list-hdr{background:white;border:1px solid var(--border);font-size:9px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);position:sticky;top:0;z-index:10;}
.list-row{background:white;border:1px solid var(--border);border-left:4px solid var(--lc,var(--border));transition:border-color 0.12s;}
.list-row.recommended{border-left-color:var(--green)!important;}
.list-row.monitor{border-left-color:var(--amber)!important;}
.list-row.not-selected{border-left-color:var(--reject)!important;}
.list-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;}
.mini-stars{display:flex;gap:1px;font-size:13px;}
.ldec-row{display:flex;gap:3px;}
.ldec{min-height:32px;padding:0 7px;border-radius:5px;border:1px solid;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;background:transparent;transition:all 0.12s;}
.ldec.recommend{border-color:#b2dfdb;color:var(--green);}
.ldec.recommend.active{background:var(--green);border-color:var(--green);color:white;}
.ldec.monitor{border-color:#ffe0b2;color:var(--amber);}
.ldec.monitor.active{background:var(--amber);border-color:var(--amber);color:white;}
.ldec.reject{border-color:#ffcdd2;color:var(--reject);}
.ldec.reject.active{background:var(--reject);border-color:var(--reject);color:white;}

/* ── SCHEDULE ── */
.sched-day{margin-bottom:24px;}
.sched-hdr{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:0.05em;text-transform:uppercase;color:var(--red);margin-bottom:10px;padding-bottom:7px;border-bottom:3px solid var(--red);display:flex;align-items:center;gap:12px;}
.sched-hdr span{font-size:12px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;}
.sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:600px){.sched-grid{grid-template-columns:1fr;}}
.pitch-lbl{font-size:9px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:4px 10px;background:var(--light);border-radius:4px;text-align:center;}
.fixture{background:white;border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--shadow);transition:all 0.15s;min-height:var(--touch);}
.fixture.active-game{border-color:var(--red);background:#fff5f5;}
.fix-time{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--red);min-width:40px;}
.fix-teams{flex:1;min-width:0;}
.fix-match{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fix-team{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;gap:5px;}
.fix-vs{font-size:10px;font-weight:700;color:var(--muted);}
.kit-sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(0,0,0,0.1);flex-shrink:0;}
.fix-pitch{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0.07em;text-transform:uppercase;margin-top:2px;}
.fix-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;min-height:36px;padding:0 12px;border-radius:6px;border:1.5px solid var(--red);color:var(--red);background:transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.fix-btn.active-btn,.fixture.active-game .fix-btn{background:var(--red);color:white;}
.fix-banner{background:var(--red);color:white;padding:10px 14px;display:flex;align-items:center;gap:10px;border-radius:10px;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;flex-wrap:wrap;gap:8px;}
.fix-clear{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:5px;padding:5px 12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;min-height:32px;}

/* ── SUMMARY ── */
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:600px){.sum-stats{grid-template-columns:repeat(2,1fr);}}
.sum-stat{background:white;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;box-shadow:var(--shadow);}
.sum-num{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;line-height:1;margin-bottom:4px;}
.sum-lbl{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.sum-stat.rec .sum-num{color:var(--green);}
.sum-stat.mon .sum-num{color:var(--amber);}
.sum-stat.rej .sum-num{color:var(--reject);}
.sum-stat.tot .sum-num{color:var(--red);}
.sum-sec-hdr{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin:18px 0 9px;color:var(--dark);}
.sum-sec-hdr::after{content:'';flex:1;height:2px;background:var(--border);}
.sum-sec-hdr.rh::after{background:var(--green);}
.sum-sec-hdr.mh::after{background:var(--amber);}
.sum-rows{display:flex;flex-direction:column;gap:5px;}
.sum-row{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:grid;grid-template-columns:170px 110px 50px 50px 1fr;gap:10px;align-items:center;box-shadow:var(--shadow);}
@media(max-width:700px){.sum-row{grid-template-columns:1fr 80px 40px;}.sum-hide{display:none;}}
.sum-row.rec{border-left:4px solid var(--green);}
.sum-row.mon{border-left:4px solid var(--amber);}
.sum-row-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;}
.sum-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;}
.sum-score.hi{color:var(--green);}
.sum-score.mid{color:var(--amber);}
.sum-notes{font-size:11px;color:var(--muted);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.export-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:12px 28px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-top:18px;min-height:var(--touch);}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;color:var(--dark);margin-bottom:6px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(200,16,46,0.25);border-radius:2px;}

/* Loading overlay */
#loadingOverlay{
  position:fixed;inset:0;background:var(--red);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity 0.4s;
}
#loadingOverlay img{height:80px;filter:brightness(0) invert(1);margin-bottom:20px;}
#loadingOverlay p{color:white;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;opacity:0.9;}
#loadingOverlay .spin{width:28px;height:28px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="syncBar"></div>

<!-- Loading screen -->
<div id="loadingOverlay">
  <img src="/mnt/user-data/uploads/England_Masters_Logo.png" alt="England Hockey Masters">
  <p>Loading Scouting System</p>
  <div class="spin"></div>
</div>

<header>
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
    <svg viewBox="0 0 24 24"><rect y="4" width="24" height="2" rx="1"/><rect y="11" width="24" height="2" rx="1"/><rect y="18" width="24" height="2" rx="1"/></svg>
  </button>
  <img class="logo-img" src="/mnt/user-data/uploads/England_Masters_Logo.png" alt="">
  <div>
    <div class="hdr-title">O45M Scouting<small>Area Champs · 16–17 May 2026</small></div>
  </div>
  <div class="hdr-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connecting…</span>
    </div>
    <div class="stat-chip">🟢 <span id="recCount">0</span></div>
    <div class="stat-chip">🟡 <span id="monCount">0</span></div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-search"><input class="sb-input" type="search" id="searchInput" placeholder="Search player or club…" autocorrect="off" autocapitalize="off"></div>

    <span class="sb-label">Area</span>
    <button class="sb-btn active" data-area="ALL" onclick="setArea('ALL')">All Areas <span class="sb-count" id="cnt-ALL">142</span></button>
    <button class="sb-btn" data-area="East" onclick="setArea('East')"><span class="area-dot" style="background:#f5c800;border:1px solid rgba(255,255,255,0.2)"></span>East <span class="sb-count">18</span></button>
    <button class="sb-btn" data-area="London" onclick="setArea('London')"><span class="area-dot" style="background:#C8102E"></span>London <span class="sb-count">18</span></button>
    <button class="sb-btn" data-area="Midlands" onclick="setArea('Midlands')"><span class="area-dot" style="background:#6a0dad"></span>Midlands <span class="sb-count">17</span></button>

// ── STATE ─────────────────────────────────────────────────────────────────────
let A = {}; // assessments cache: player_id -> {technical,tactical,physical,attitude,notes,decision}
let cArea='ALL', cDec='ALL_D', cPos='ALL_P', cSquad='ALL_S', cView='grid', sT='', fixF=null;
let saveTimers = {}; // debounce timers per player
let pollTimer = null;
let lastPollTime = 0;

// ── SUPABASE API ──────────────────────────────────────────────────────────────
const hdrs = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

async function sbFetch(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: hdrs, ...opts
  });
  return r;
}

async function loadAll() {
  try {
    setSyncState('syncing');
    const r = await sbFetch('assessments?select=*');
    if (!r.ok) throw new Error('Load failed');
    const rows = await r.json();
    rows.forEach(row => {
      A[row.player_id] = {
        technical: row.technical||0, tactical: row.tactical||0,
        physical: row.physical||0, attitude: row.attitude||0,
        notes: row.notes||'', decision: row.decision||''
      };
    });
    setSyncState('live');
    return true;
  } catch(e) {
    setSyncState('error');
    return false;
  }
}

async function savePlayer(id) {
  const s = gs(id);
  setSyncState('syncing');
  // Show saving indicator on card
  document.querySelectorAll(`.csync-${id}`).forEach(el => { el.className=`card-sync csync-${id} saving`; });
  try {
    const r = await sbFetch(
      `assessments?player_id=eq.${id}`,
      {
        method: 'PATCH',
        headers: {...hdrs, 'Prefer': 'return=minimal'},
        body: JSON.stringify({
          technical: s.technical, tactical: s.tactical,
          physical: s.physical, attitude: s.attitude,
          notes: s.notes, decision: s.decision,
          updated_at: new Date().toISOString()
        })
      }
    );
    // If no row exists yet, insert
    if (r.status === 404 || r.headers.get('content-range') === '*/0') {
      await sbFetch('assessments', {
        method: 'POST',
        headers: {...hdrs, 'Prefer': 'return=minimal'},
        body: JSON.stringify({
          player_id: id,
          technical: s.technical, tactical: s.tactical,
          physical: s.physical, attitude: s.attitude,
          notes: s.notes, decision: s.decision
        })
      });
    }
    // Check if we need to upsert (PATCH returns 0 rows if player not in DB)
    const ct = r.headers.get('content-range');
    if (ct === '*/0' || r.status === 200) {
      // might need upsert
    }
    setSyncState('live');
    setTimeout(() => {
      document.querySelectorAll(`.csync-${id}`).forEach(el => { el.className=`card-sync csync-${id} saved`; });
      setTimeout(() => { document.querySelectorAll(`.csync-${id}`).forEach(el => { el.className=`card-sync csync-${id}`; }); }, 1500);
    }, 300);
  } catch(e) {
    setSyncState('error');
    document.querySelectorAll(`.csync-${id}`).forEach(el => { el.className=`card-sync csync-${id} error`; });
  }
}

async function upsertPlayer(id) {
  const s = gs(id);
  setSyncState('syncing');
  try {
    await sbFetch('assessments', {
      method: 'POST',
      headers: {...hdrs, 'Prefer': 'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify({
        player_id: id,
        technical: s.technical, tactical: s.tactical,
        physical: s.physical, attitude: s.attitude,
        notes: s.notes, decision: s.decision,
        updated_at: new Date().toISOString()
      })
    });
    setSyncState('live');
    document.querySelectorAll(`.csync-${id}`).forEach(el => {
      el.className=`card-sync csync-${id} saved`;
      setTimeout(()=>{ el.className=`card-sync csync-${id}`; }, 1500);
    });
  } catch(e) { setSyncState('error'); }
}

// Poll for remote changes every N seconds
async function pollRemote() {
  try {
    const r = await sbFetch(`assessments?updated_at=gt.${new Date(lastPollTime-1000).toISOString()}&select=*`);
    if (!r.ok) return;
    const rows = await r.json();
    let changed = false;
    rows.forEach(row => {
      const current = A[row.player_id];
      const newData = {
        technical:row.technical||0, tactical:row.tactical||0,
        physical:row.physical||0, attitude:row.attitude||0,
        notes:row.notes||'', decision:row.decision||''
      };
      // Only update if different (avoid overwriting local edits in flight)
      if (!current ||
          current.technical!==newData.technical || current.tactical!==newData.tactical ||
          current.physical!==newData.physical || current.attitude!==newData.attitude ||
          current.notes!==newData.notes || current.decision!==newData.decision) {
        A[row.player_id] = newData;
        changed = true;
        // Refresh just that player's card/row in place
        refreshPlayerUI(row.player_id);
      }
    });
    if (changed) updateCounts();
    lastPollTime = Date.now();
  } catch(e) {}
}

function startPolling() {
  lastPollTime = Date.now();
  pollTimer = setInterval(pollRemote, POLL_INTERVAL);
}

// ── SYNC UI ───────────────────────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  const bar = document.getElementById('syncBar');
  dot.className = 'sync-dot ' + state;
  bar.className = state === 'syncing' ? 'syncing' : state === 'error' ? 'error' : '';
  lbl.textContent = state==='live'?'Live':state==='syncing'?'Syncing…':'Offline';
}

// ── LOCAL STATE ───────────────────────────────────────────────────────────────
function gs(id) {
  if (!A[id]) A[id] = {technical:0,tactical:0,physical:0,attitude:0,notes:'',decision:''};
  return A[id];
}
function avg(id) {
  const s=gs(id), sc=[s.technical,s.tactical,s.physical,s.attitude].filter(x=>x>0);
  return sc.length ? sc.reduce((a,b)=>a+b,0)/sc.length : 0;
}

function setArea(a) { cArea=a; document.querySelectorAll('[data-area]').forEach(b=>b.classList.toggle('active',b.dataset.area===a)); closeSidebar(); render(); }
function setDecFilter(d) { cDec=d; document.querySelectorAll('[data-dec]').forEach(b=>b.classList.toggle('active',b.dataset.dec===d)); closeSidebar(); render(); }
function setPosFilter(p) { cPos=p; document.querySelectorAll('[data-pos]').forEach(b=>b.classList.toggle('active',b.dataset.pos===p)); closeSidebar(); render(); }

function setView(v) {
  cView=v;
  document.querySelectorAll('.view-tab').forEach((b,i)=>b.classList.toggle('active',['grid','list','schedule','summary'][i]===v));
  const map={grid:'grid',list:'flex',schedule:'block',summary:'block'};
  ['gridView','listView','scheduleView','summaryView'].forEach(id=>{document.getElementById(id).style.display='none';});
  document.getElementById(v+'View').style.display=map[v]||'block';
  render();
}

document.getElementById('searchInput').addEventListener('input', e=>{ sT=e.target.value; render(); });

function fp() {
  return rawPlayers.filter(p => {
    if (fixF && p.area!==fixF.home && p.area!==fixF.away) return false;
    if (!fixF && cArea!=='ALL' && p.area!==cArea) return false;
    if (cPos==='GK' && p.pos!=='GK') return false;
    if (cPos==='Outfield' && p.pos!=='Outfield') return false;
    if (cSquad!=='ALL_S' && cSquad!=='none' && p.squad!==cSquad) return false;
    if (cSquad==='none' && p.squad!=='') return false;
    const s=gs(p.id);
    if (cDec==='recommended' && s.decision!=='recommended') return false;
    if (cDec==='monitor' && s.decision!=='monitor') return false;
    if (cDec==='not-selected' && s.decision!=='not-selected') return false;
    if (cDec==='unseen' && s.decision!=='') return false;
    if (sT) { const q=sT.toLowerCase(); if(!p.name.toLowerCase().includes(q)&&!p.club.toLowerCase().includes(q)&&!p.area.toLowerCase().includes(q)) return false; }
    return true;
  });
}

// ── STARS ─────────────────────────────────────────────────────────────────────
function svgStar(f) {
  const c = f?'#C8102E':'#e0e0e0';
  return `<svg viewBox="0 0 20 20" fill="${c}"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
}
function starsH(id, f, v) {
  return Array.from({length:5},(_,i)=>`<span class="star" onclick="setR(${id},'${f}',${i+1})">${svgStar(i<v)}</span>`).join('');
}

function setR(id, f, v) {
  const s=gs(id); s[f]=s[f]===v?0:v;
  document.querySelectorAll(`[data-stars="${id}-${f}"]`).forEach(el=>el.innerHTML=starsH(id,f,s[f]));
  debounceUpsert(id);
  updateCounts();
}

function setD(id, dec) {
  const s=gs(id); s.decision=s.decision===dec?'':dec;
  // Update all UI elements for this player
  document.querySelectorAll(`[data-pid="${id}"]`).forEach(el=>{
    el.className=el.className.replace(/\b(recommended|monitor|not-selected)\b/g,'').trim();
    if(s.decision) el.classList.add(s.decision);
  });
  document.querySelectorAll(`.strip-${id}`).forEach(el=>{
    el.className=`card-strip strip-${id}${s.decision?' '+s.decision:''}`;
    const p=rawPlayers.find(x=>x.id===id);
    el.style.background=s.decision?'':AC[p.area]||'#ccc';
  });
  document.querySelectorAll(`[data-did="${id}"]`).forEach(b=>b.classList.toggle('active',b.dataset.dtype===s.decision));
  debounceUpsert(id);
  updateCounts();
  if(cDec!=='ALL_D') render();
}

function sN(id, v) {
  gs(id).notes=v;
  debounceUpsert(id);
}

function debounceUpsert(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => upsertPlayer(id), 800);
}

// ── REFRESH SINGLE PLAYER UI (for remote updates) ─────────────────────────────
function refreshPlayerUI(id) {
  const s = gs(id);
  const p = rawPlayers.find(x=>x.id===id);
  if (!p) return;
  // Update stars
  ['technical','tactical','physical','attitude'].forEach(f => {
    document.querySelectorAll(`[data-stars="${id}-${f}"]`).forEach(el=>el.innerHTML=starsH(id,f,s[f]));
  });
  // Update decision buttons
  document.querySelectorAll(`[data-did="${id}"]`).forEach(b=>b.classList.toggle('active',b.dataset.dtype===s.decision));
  // Update card class
  document.querySelectorAll(`[data-pid="${id}"]`).forEach(el=>{
    el.className=el.className.replace(/\b(recommended|monitor|not-selected)\b/g,'').trim();
    if(s.decision) el.classList.add(s.decision);
  });
  // Update strip
  document.querySelectorAll(`.strip-${id}`).forEach(el=>{
    el.className=`card-strip strip-${id}${s.decision?' '+s.decision:''}`;
    el.style.background=s.decision?'':AC[p.area]||'#ccc';
  });
  // Update notes (only if textarea not focused)
  document.querySelectorAll(`.notes-${id}`).forEach(el=>{
    if(document.activeElement!==el) el.value=s.notes;
  });
}

      <div class="sum-row-name">${p.name} ${sqB(p.squad)}</div>
      <div class="sum-hide">${areaTag(p.area)}</div>
      <div class="sum-hide" style="font-size:10px;color:#888">${p.pos}${p.cap?' · '+p.capType:''}</div>
      <div class="sum-score ${sc}">${av>0?av.toFixed(1):'—'}</div>
      <div class="sum-notes sum-hide">${s.notes||'No notes'}</div>
    </div>`;
  }
  if(recs.length) el.innerHTML+=`<div class="sum-sec-hdr rh">✅ Recommended for Trials (${recs.length})</div><div class="sum-rows">${sbs(recs).map(p=>pRow(p,'rec')).join('')}</div>`;
  else el.innerHTML+=`<div class="sum-sec-hdr" style="color:#aaa">No players recommended yet</div>`;
  if(mons.length) el.innerHTML+=`<div class="sum-sec-hdr mh">⚡ Monitor List (${mons.length})</div><div class="sum-rows">${sbs(mons).map(p=>pRow(p,'mon')).join('')}</div>`;
  if(recs.length||mons.length) el.innerHTML+=`<button class="export-btn" onclick="expCSV()">📥 Export Shortlist CSV</button>`;
}

// ── COUNTS ────────────────────────────────────────────────────────────────────
function updateCounts() {
  const recs=rawPlayers.filter(p=>gs(p.id).decision==='recommended').length;
  const mons=rawPlayers.filter(p=>gs(p.id).decision==='monitor').length;
  document.getElementById('recCount').textContent=recs;
  document.getElementById('monCount').textContent=mons;
  document.getElementById('cnt-REC').textContent=recs;
  document.getElementById('cnt-MON').textContent=mons;
  document.getElementById('cnt-REJ').textContent=rawPlayers.filter(p=>gs(p.id).decision==='not-selected').length;
  document.getElementById('cnt-UN').textContent=rawPlayers.filter(p=>gs(p.id).decision==='').length;
  document.getElementById('cnt-ALLD').textContent=rawPlayers.length;
  document.getElementById('cnt-ALL').textContent=rawPlayers.length;
  document.getElementById('cnt-SQ-ALL').textContent=rawPlayers.length;
  document.getElementById('cnt-SQ-MAIN').textContent=rawPlayers.filter(p=>p.squad==='main').length;
  document.getElementById('cnt-SQ-MAINNTR').textContent=rawPlayers.filter(p=>p.squad==='main-ntr').length;
  document.getElementById('cnt-SQ-SOM').textContent=rawPlayers.filter(p=>p.squad==='som').length;
  document.getElementById('cnt-SQ-SOMNTR').textContent=rawPlayers.filter(p=>p.squad==='som-ntr').length;
  document.getElementById('cnt-SQ-NONE').textContent=rawPlayers.filter(p=>!p.squad).length;
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function expCSV() {
  const rows=[['Name','Club','Area','Position','Captain','Squad','Technical','Tactical','Physical','Attitude','Overall','Decision','Notes']];
  rawPlayers.filter(p=>['recommended','monitor'].includes(gs(p.id).decision)).forEach(p=>{
    const s=gs(p.id),av=avg(p.id);
    rows.push([p.name,p.club,p.area,p.pos,p.cap?p.capType:'',p.squad||'None',s.technical,s.tactical,s.physical,s.attitude,av>0?av.toFixed(2):'',s.decision==='recommended'?'Recommend for Trials':'Monitor',s.notes.replace(/"/g,'""')]);
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n')],{type:'text/csv'}));
  a.download='england_o45m_shortlist_2026.csv'; a.click();
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const pl=fp();
  if(cView==='grid') renderGrid(pl);
  else if(cView==='list') renderList(pl);
  else if(cView==='schedule') renderSchedule();
  else renderSummary();
  updateCounts();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadAll();
  updateCounts();
  render();
  document.getElementById('loadingOverlay').style.opacity='0';
  setTimeout(()=>{ document.getElementById('loadingOverlay').style.display='none'; }, 400);
  startPolling();
}

init();
</script>
</body>
</html>
